<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bbs-rs</title>
<link rel="stylesheet" href="/xterm.css" />
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #ccc;
    font-family: ui-monospace, Menlo, Consolas, monospace; }
  #login { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: #000; z-index: 10; }
  #login form { border: 1px solid #333; padding: 24px 28px; border-radius: 6px;
    background: #0a0a0a; min-width: 260px; }
  #login h1 { margin: 0 0 4px; font-size: 18px; }
  #login p { margin: 0 0 16px; color: #777; font-size: 12px; }
  #login label { display: block; font-size: 12px; color: #999; margin: 10px 0 3px; }
  #login input { width: 100%; box-sizing: border-box; padding: 7px 8px; background: #111;
    border: 1px solid #333; color: #eee; border-radius: 4px; font: inherit; }
  #login button { margin-top: 16px; width: 100%; padding: 8px; background: #1e5f74;
    border: 0; color: #fff; border-radius: 4px; cursor: pointer; font: inherit; }
  #login .err { color: #d66; font-size: 12px; min-height: 16px; margin-top: 10px; }
  #wrap { position: absolute; inset: 0; padding: 6px; box-sizing: border-box; display: none; }
  #terminal { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="login">
    <form id="loginForm" autocomplete="off">
      <h1>bbs-rs</h1>
      <p>Log in to the board. Try <code>guest</code> / <code>guest</code>.</p>
      <label for="user">Username</label>
      <input id="user" name="user" value="guest" autofocus />
      <label for="pass">Password</label>
      <input id="pass" name="pass" type="password" value="guest" />
      <button type="submit">Connect</button>
      <div class="err" id="err"></div>
    </form>
  </div>
  <div id="wrap"><div id="terminal"></div></div>

  <script src="/xterm.js"></script>
  <script src="/addon-fit.js"></script>
  <script>
    const term = new Terminal({ cursorBlink: true, fontFamily: 'ui-monospace, Menlo, Consolas, monospace', fontSize: 14, theme: { background: '#000000' } });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);

    const enc = new TextEncoder();
    let ws = null;

    function sendResize() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;
      const err = document.getElementById('err');
      err.textContent = 'Connecting…';

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        document.getElementById('login').style.display = 'none';
        const wrap = document.getElementById('wrap');
        wrap.style.display = 'block';
        term.open(document.getElementById('terminal'));
        fit.fit();
        ws.send(JSON.stringify({ type: 'login', user, pass }));
        sendResize();
        term.focus();
      };
      ws.onmessage = (ev) => {
        if (typeof ev.data === 'string') {
          term.write(ev.data.replace(/\n/g, '\r\n'));
        } else {
          term.write(new Uint8Array(ev.data));
        }
      };
      ws.onclose = () => {
        term.write('\r\n\x1b[33m*** disconnected ***\x1b[0m\r\n');
      };
      ws.onerror = () => { err.textContent = 'Connection failed.'; };
    });

    // Keystrokes → binary frames (same bytes the SSH transport sends).
    term.onData((d) => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(enc.encode(d));
    });

    window.addEventListener('resize', () => {
      if (document.getElementById('wrap').style.display === 'block') {
        fit.fit();
        sendResize();
      }
    });
  </script>
</body>
</html>
